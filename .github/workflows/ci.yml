name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: relagraph
          POSTGRES_USER: relagraph
          POSTGRES_PASSWORD: relagraph
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U relagraph -d relagraph"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      APP_ENV: local
      NODE_ENV: production
      NEXT_PUBLIC_API_BASE_URL: http://localhost:3000
      DATABASE_URL: postgresql://relagraph:relagraph@localhost:5432/relagraph

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: detect --no-git --source . --redact

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Apply DB migrations
        run: pnpm db:migrate
